<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>鍼コスト計算</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      text-align: center;
    }
    input {
      font-size: 18px;
      padding: 8px;
      margin: 10px;
      width: 100px;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
      margin-top: 10px;
    }
    #result {
      font-size: 24px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>鍼コスト計算</h2>
  <div>
    単価（円）<br>
    <input type="number" id="price" placeholder="例：8.5">
  </div>
  <div>
    本数<br>
    <input type="number" id="count" placeholder="例：6">
  </div>
  <button onclick="calculate()">計算する</button>
  <div id="result">合計：0円</div>
  <script>
    function calculate() {
      const price = parseFloat(document.getElementById('price').value) || 0;
      const count = parseInt(document.getElementById('count').value) || 0;
      const total = price * count;
      document.getElementById('result').innerText = "合計：" + total + "円";
    }
  </script>
</body>
</html>
